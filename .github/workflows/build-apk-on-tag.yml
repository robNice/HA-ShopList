name: Build APK and app bundle on v* tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Build Release artifacts
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleGithubRelease :app:bundleGithubRelease :app:assemblePlayRelease :app:bundlePlayRelease

      - name: Rename artifacts to include tag
        run: |
          mv "app/build/outputs/apk/github/release/app-github-release.apk" "homeShopList-${{ github.ref_name }}.apk"
          mv "app/build/outputs/bundle/githubRelease/app-github-release.aab" "homeShopList-${{ github.ref_name }}.aab"
          mv "app/build/outputs/apk/play/release/app-play-release.apk" "homeShopList-playstore-${{ github.ref_name }}.apk"
          mv "app/build/outputs/bundle/playRelease/app-play-release.aab" "homeShopList-playstore-${{ github.ref_name }}.aab"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.ref_name }}
          path: |  
            homeShopList-${{ github.ref_name }}.apk
            homeShopList-${{ github.ref_name }}.aab
            homeShopList-playstore-${{ github.ref_name }}.apk
            homeShopList-playstore-${{ github.ref_name }}.aab
          if-no-files-found: error

      - name: Publish release artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: | 
            homeShopList-${{ github.ref_name }}.apk
            homeShopList-${{ github.ref_name }}.aab
            homeShopList-playstore-${{ github.ref_name }}.apk
            homeShopList-playstore-${{ github.ref_name }}.aab
